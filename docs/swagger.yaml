        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить все рабочие конфигурации
      tags:
      - '10. Конфигурация: Конфигурации устройств'
    post:
      consumes:
      - application/json
      parameters:
