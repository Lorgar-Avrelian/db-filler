paths:
  /api/v1/components:
    get:
      description: Возвращает список всех составных частей устройств вместе со всеми
        собственными и унаследованными параметрами
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/filler_internal_model.Component'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить все компоненты вместе с параметрами
      tags:
      - '1. Модельный каталог: Компоненты'
    post:
      consumes:
      - application/json
      description: Создает новую запись составной части устройства. Если base_component
        равен null, создается базовый компонент.
      parameters:
      - description: Данные компонента
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/filler_internal_dto.ComponentCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/filler_internal_model.Component'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Создать компонент
      tags:
      - '1. Модельный каталог: Компоненты'
  /api/v1/components/{id}:
    delete:
      description: Удаляет компонент по ID, а также автоматически стирает всю иерархию
        дочерних элементов
      parameters:
      - description: ID Компонента
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Удалить компонент и всех его наследников
      tags:
      - '1. Модельный каталог: Компоненты'
    get:
      description: Возвращает компонент и иерархически объединенный список его параметров
        из БД
      parameters:
      - description: ID Компонента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/filler_internal_model.Component'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить компонент по ID
      tags:
      - '1. Модельный каталог: Компоненты'
    put:
      consumes:
      - application/json
      parameters:
      - description: ID Компонента
        in: path
        name: id
        required: true
        type: integer
      - description: Новые данные
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/filler_internal_dto.ComponentUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/filler_internal_model.Component'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Обновить компонент
      tags:
      - '1. Модельный каталог: Компоненты'
  /api/v1/components/search:
    get:
      description: Ищет компоненты, у которых строка совпадает с title, name_en, name_ru,
        description_en или description_ru
      parameters:
      - description: Строка поиска
        in: query
        name: query
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/filler_internal_model.Component'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Поиск компонентов по подстроке
      tags:
      - '1. Модельный каталог: Компоненты'
  /api/v1/configurations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/filler_internal_model.Configuration'
