        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Удалить рабочую конфигурацию по ID
      tags:
      - '10. Конфигурация: Конфигурации устройств'
    get:
      parameters:
      - description: ID Конфигурации
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Возвращает полностью раскрытое содержание
          schema:
            $ref: '#/definitions/filler_internal_model.Configuration'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить рабочую конфигурацию по ID
      tags:
      - '10. Конфигурация: Конфигурации устройств'
    put:
      consumes:
